<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Automation System - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <main class="login-wrapper">
        <section class="login-card">
            
            <header class="login-header">
                <h1 class="login-title">研究室データ分析システム</h1>
                <p class="login-subtitle">ユーザー認証を行ってください</p>
            </header>

            <!-- フォーム。action属性はバックエンドのルーティングに合わせて変更してください -->
            <form action="/login" method="POST" class="login-form">
                
                <div class="form-group">
                    <label for="user_id" class="form-label">ユーザーID</label>
                    <input type="text" id="user_id" name="user_id" class="form-input" required placeholder="例: researcher_01">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">パスワード</label>
                    <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> ログイン状態を保持する
                    </label>
                </div>

                <p style="color: red;">{{ error }}</p>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">ログイン</button>
                </div>

            </form>

            <footer class="login-footer">
                <p class="copyright">&copy; .</p>
            </footer>

        </section>
    </main>

</body>
</html>
